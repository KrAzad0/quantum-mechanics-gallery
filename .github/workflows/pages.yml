name: Deploy MkDocs site to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Prepare docs (copy topics + topics index)
        run: |
          mkdir -p docs/topics
          rm -rf docs/topics/*
          cp -r topics/* docs/topics/

          python - <<'PY'
          import pathlib

          topics = []
          for p in pathlib.Path('topics').rglob('*.md'):
            rel = p.relative_to('topics')
            title = rel.stem.replace('-', ' ').replace('_', ' ').title()
            topics.append((rel, title))

          topics.sort(key=lambda x: str(x[0]))

          lines = [
            "# Topics",
            "",
            "Use the search bar to filter by keyword (tag, symbol, concept).",
            "",
          ]
          for rel, title in topics:
            lines.append(f"- [{title}](topics/{rel.as_posix()})")

          (pathlib.Path('docs') / 'topics.md').write_text("\n".join(lines) + "\n", encoding='utf-8')
          PY

      - name: Build MkDocs site
        run: mkdocs build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
